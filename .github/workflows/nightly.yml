name: Nightly Build

on:
  repository_dispatch:
    types: [nightly]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (commit SHA or branch, defaults to main)"
        required: false
        default: "main"
        type: string
      skip_windows:
        description: "Skip optional Windows validation jobs"
        required: false
        default: true
        type: boolean

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Nightly Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      nightly_version: ${{ steps.version.outputs.nightly_version }}
      ref: ${{ steps.params.outputs.ref }}
      skip_windows: ${{ steps.params.outputs.skip_windows }}
      package_matrix: ${{ steps.package-matrix.outputs.matrix }}
      release_body: ${{ steps.changelog.outputs.notes }}
    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Get build parameters
        id: params
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.ref }}" >> "$GITHUB_OUTPUT"
            skip_windows='${{ github.event.client_payload.skip_windows }}'
          else
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
            skip_windows='${{ inputs.skip_windows }}'
          fi

          skip_windows="$(printf '%s' "${skip_windows:-true}" | tr '[:upper:]' '[:lower:]')"
          case "${skip_windows}" in
            true|1|yes) echo "skip_windows=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "skip_windows=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build package matrix
        id: package-matrix
        env:
          SKIP_WINDOWS: ${{ steps.params.outputs.skip_windows }}
        run: |
          echo "matrix=$(node electron-release/package-matrix.mjs --skip-windows "$SKIP_WINDOWS")" >> "$GITHUB_OUTPUT"

      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ steps.params.outputs.ref }}
          path: source
          fetch-depth: 0
          fetch-tags: true

      - name: Compute nightly version
        id: version
        working-directory: source
        shell: bash
        run: |
          set -euo pipefail
          BASE_VERSION="$(node -e "process.stdout.write(require('./package.json').version)")"
          if [[ ! "${BASE_VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Invalid base version in package.json: ${BASE_VERSION}" >&2
            exit 1
          fi
          MAJOR="${BASE_VERSION%%.*}"
          REST="${BASE_VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          echo "nightly_version=${MAJOR}.${MINOR}.$((PATCH + 1))-nightly" >> "$GITHUB_OUTPUT"

      - name: Generate nightly changelog from commits
        id: changelog
        working-directory: source
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          CURRENT_REF: ${{ steps.params.outputs.ref }}
          NIGHTLY_VERSION: ${{ steps.version.outputs.nightly_version }}
        shell: bash
        run: |
          set -euo pipefail
          LAST_STABLE_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"

          if [[ -n "${LAST_STABLE_TAG}" ]]; then
            RANGE="${LAST_STABLE_TAG}..HEAD"
            COMPARE_URL="https://github.com/Voice-Wise/voicewise-electron/compare/${LAST_STABLE_TAG}...${CURRENT_REF}"
          else
            RANGE="HEAD"
            COMPARE_URL=""
          fi

          COMMITS="$(git log --reverse --no-merges --format='%s' "${RANGE}" | grep -v '^chore(release):' || true)"
          HEADER="## Nightly Build\n\n- Version: v${NIGHTLY_VERSION}\n- Ref: ${CURRENT_REF}\n"
          if [[ -n "${COMPARE_URL}" ]]; then
            HEADER="${HEADER}- Compare: ${COMPARE_URL}\n"
          fi

          if [[ -z "$COMMITS" ]]; then
            NOTES="${HEADER}\n\n## Changelog\n\n- No changes.\n"
          else
            PROMPT="You are generating release notes for a NIGHTLY build. Based on the following git commit messages, generate a concise and user-friendly changelog in BOTH Chinese (Simplified) and English. First output the Chinese version, then add a horizontal rule (---), then output the English version. Group changes by category. Only include meaningful changes, skip trivial commits. Output ONLY markdown changelog content.\n\nCommit messages:\n$COMMITS"
            RESPONSE=$(curl -s --max-time 30 "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions" \
              -H "Authorization: Bearer $DASHSCOPE_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg prompt "$PROMPT" '{model:"qwen3.6-plus",messages:[{role:"user",content:$prompt}],max_tokens:1024}')" 2>/dev/null || echo "{}")
            CHANGELOG=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
            if [[ -z "$CHANGELOG" ]]; then
              NOTES="${HEADER}\n\n## Changelog\n\nSee source repository for details.\n"
            else
              NOTES="${HEADER}\n\n## Changelog\n\n${CHANGELOG}\n"
            fi
          fi

          {
            echo "notes<<EOF"
            echo -e "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  test:
    name: Test (${{ matrix.name }})
    needs: [prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest
          - name: macOS (x64)
            os: macos-latest
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/audio-capture -> target

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Run local functional tests
        run: npm run test:functional:local

  test-windows:
    name: Test (Windows)
    needs: [prepare]
    if: ${{ needs.prepare.outputs.skip_windows != 'true' }}
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Enable git long paths
        run: git config --system core.longpaths true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/audio-capture -> target

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Run local functional tests
        run: npm run test:functional:local

      - name: Run native smoke tests
        run: npm run test:native-smoke

  cloud-regression:
    name: Cloud Regression
    needs: [prepare]
    runs-on: macos-latest
    env:
      VOICEWISE_TEST_AUTH_JSON: ${{ secrets.VOICEWISE_TEST_AUTH_JSON }}
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cloud functional tests
        run: npm run test:functional:cloud

      - name: Run Omni Plus cloud retry tests
        run: npm run test:functional:cloud:omni-plus-retry

  create-release:
    name: Create Nightly Release
    needs: [prepare, test, cloud-regression]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      nightly_version: ${{ needs.prepare.outputs.nightly_version }}
      ref: ${{ needs.prepare.outputs.ref }}
      skip_windows: ${{ needs.prepare.outputs.skip_windows }}
    steps:
      - name: Delete existing nightly release and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          if gh release view nightly --repo "${REPO}" >/dev/null 2>&1; then
            gh release delete nightly --repo "${REPO}" --yes --cleanup-tag
          fi
          if gh api "repos/${REPO}/git/ref/tags/nightly" >/dev/null 2>&1; then
            gh api -X DELETE "repos/${REPO}/git/refs/tags/nightly"
          fi

      - name: Create GitHub prerelease
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: LiveType Nightly (${{ needs.prepare.outputs.nightly_version }})
          body: ${{ needs.prepare.outputs.release_body }}
          generate_release_notes: false
          draft: false
          prerelease: true

  package:
    name: Package (${{ matrix.name }})
    needs: [prepare, create-release]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.platform == 'windows' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.package_matrix) }}
    env:
      SENTRY_RELEASE: voicewise@${{ needs.create-release.outputs.nightly_version }}
      SENTRY_DIST: nightly-${{ github.run_number }}-${{ github.run_attempt }}
      VITE_SENTRY_RELEASE: voicewise@${{ needs.create-release.outputs.nightly_version }}
      VITE_SENTRY_DIST: nightly-${{ github.run_number }}-${{ github.run_attempt }}
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.create-release.outputs.ref }}

      - name: Enable git long paths
        if: ${{ runner.os == 'Windows' }}
        run: git config --system core.longpaths true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Patch version for nightly build
        env:
          NIGHTLY_VERSION: ${{ needs.create-release.outputs.nightly_version }}
        run: |
          node -e "const fs=require('fs'); const p='package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.env.NIGHTLY_VERSION; fs.writeFileSync(p, JSON.stringify(pkg,null,2)+'\n')"

      - name: Install NSIS
        if: ${{ runner.os == 'Windows' }}
        run: choco install nsis -y --no-progress

      - name: Import Apple code signing cert
        if: ${{ runner.os == 'macOS' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          KEYCHAIN_PATH="$RUNNER_TEMP/livetype-build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/apple_cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          CSC_NAME="${APPLE_SIGNING_IDENTITY#Developer ID Application: }"
          echo "CSC_NAME=${CSC_NAME}" >> "$GITHUB_ENV"

      - name: Build Electron package
        run: npm run build && npx electron-builder ${{ matrix.builderArgs }}

      - name: Collect release assets
        shell: bash
        env:
          ARTIFACT_PATTERNS: ${{ toJson(matrix.artifactPaths) }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          node electron-release/collect-release-assets.mjs \
            --patterns-json "$ARTIFACT_PATTERNS" \
            --out-dir release-assets

      - name: Smoke test installed Windows package
        if: ${{ runner.os == 'Windows' }}
        run: npm run test:windows-installed-launch

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload nightly release-assets/* --clobber --repo "$GITHUB_REPOSITORY"

      - name: Collect Sentry debug symbols
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT_DIR="$RUNNER_TEMP/sentry-debug/${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$OUTPUT_DIR"
          find dist \( -type d -name '*.dSYM' -o -type f -name '*.pdb' \) -exec cp -R {} "$OUTPUT_DIR/" \; || true
          touch "$OUTPUT_DIR/.keep"

      - name: Upload Sentry debug symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentry-debug-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/sentry-debug/${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: warn

      - name: Upload Sentry sourcemap artifact
        if: ${{ matrix.platform == 'macos' && matrix.arch == 'arm64' }}
        uses: actions/upload-artifact@v4
        with:
          name: sentry-dist
          path: dist
          if-no-files-found: error

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: release-assets
          if-no-files-found: error

  sentry-release:
    name: Upload Sentry Assets
    needs: [create-release, package]
    if: ${{ always() && needs.create-release.result == 'success' && needs.package.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Download Sentry sourcemap artifact
        uses: actions/download-artifact@v4
        with:
          name: sentry-dist
          path: ${{ runner.temp }}/sentry/dist

      - name: Download Sentry debug artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sentry-debug-*
          path: ${{ runner.temp }}/sentry/debug
          merge-multiple: true

      - name: Upload source map and debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: voicewise@${{ needs.create-release.outputs.nightly_version }}
          SENTRY_DIST: nightly-${{ github.run_number }}-${{ github.run_attempt }}
          SENTRY_SOURCEMAP_DIR: ${{ runner.temp }}/sentry/dist
          SENTRY_DEBUG_ROOT: ${{ runner.temp }}/sentry/debug
        run: bash scripts/upload-sentry-release-assets.sh

  publish-manifest:
    name: Publish Nightly Manifest
    needs: [create-release, package, sentry-release]
    if: ${{ always() && needs.create-release.result == 'success' && needs.package.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Generate Electron updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ASSETS_JSON="$(gh release view nightly --json assets --jq '.assets')"
          PUBLISHED_AT="$(gh release view nightly --json publishedAt --jq '.publishedAt')"
          MANIFEST_PLATFORMS="darwin-aarch64,darwin-x86_64"
          if [ "${{ needs.create-release.outputs.skip_windows }}" != "true" ]; then
            MANIFEST_PLATFORMS="${MANIFEST_PLATFORMS},windows-x86_64"
          fi
          node electron-release/generate-updater-manifest.mjs \
            --assets-json "$ASSETS_JSON" \
            --version "${{ needs.create-release.outputs.nightly_version }}" \
            --published-at "$PUBLISHED_AT" \
            --base-url "https://github.com/Voice-Wise/release/releases/download/nightly" \
            --platforms "$MANIFEST_PLATFORMS" \
            --out-dir "."

      - name: Upload manifest to nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload nightly latest.json --clobber

  verify-windows-installed-updater:
    name: Verify Windows Installed Updater
    needs: [create-release, publish-manifest]
    if: ${{ needs.create-release.outputs.skip_windows != 'true' && needs.publish-manifest.result == 'success' }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.create-release.outputs.ref }}

      - name: Download Windows installer
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $downloadDir = Join-Path $env:RUNNER_TEMP "windows-installed-updater-smoke"
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          gh release download nightly --repo $env:GITHUB_REPOSITORY --pattern "LiveType-*-windows-x64-setup.exe" --dir $downloadDir --clobber
          $installer = Get-ChildItem $downloadDir -Filter "LiveType-*-windows-x64-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer not found in $downloadDir"
          }
          "VOICEWISE_WINDOWS_INSTALLER=$($installer.FullName)" >> $env:GITHUB_ENV

      - name: Smoke test installed updater manifest and download open
        shell: pwsh
        env:
          VOICEWISE_WINDOWS_INSTALLED_UPDATER_MANIFEST_SMOKE: "1"
          VOICEWISE_WINDOWS_INSTALLED_UPDATER_DOWNLOAD_OPEN_SMOKE: "1"
          VOICEWISE_UPDATER_MANIFEST_SMOKE_CHANNEL: nightly
          VOICEWISE_UPDATER_MANIFEST_SMOKE_TIMEOUT_MS: "90000"
          VOICEWISE_UPDATER_DOWNLOAD_OPEN_SMOKE_CHANNEL: nightly
          VOICEWISE_UPDATER_DOWNLOAD_OPEN_SMOKE_OPEN_MODE: probe
        run: npm run test:windows-installed-launch

  verify-macos-installed-updater:
    name: Verify macOS Installed Updater
    needs: [create-release, publish-manifest]
    if: ${{ needs.publish-manifest.result == 'success' }}
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.create-release.outputs.ref }}

      - name: Download macOS DMG
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          arch_suffix="$(node -p "process.arch === 'arm64' ? 'arm64' : 'x64'")"
          download_dir="${RUNNER_TEMP}/macos-installed-updater-smoke"
          mkdir -p "$download_dir"
          gh release download nightly --repo "$GITHUB_REPOSITORY" --pattern "LiveType-*-macos-${arch_suffix}.dmg" --dir "$download_dir" --clobber
          dmg="$(find "$download_dir" -name "LiveType-*-macos-${arch_suffix}.dmg" -print -quit)"
          if [ -z "$dmg" ]; then
            echo "macOS DMG not found in $download_dir" >&2
            exit 1
          fi
          echo "VOICEWISE_MACOS_DMG=$dmg" >> "$GITHUB_ENV"

      - name: Smoke test installed updater manifest and download open
        shell: bash
        env:
          VOICEWISE_MACOS_INSTALLED_UPDATER_MANIFEST_SMOKE: "1"
          VOICEWISE_MACOS_INSTALLED_UPDATER_DOWNLOAD_OPEN_SMOKE: "1"
          VOICEWISE_UPDATER_MANIFEST_SMOKE_CHANNEL: nightly
          VOICEWISE_UPDATER_MANIFEST_SMOKE_TIMEOUT_MS: "90000"
          VOICEWISE_UPDATER_DOWNLOAD_OPEN_SMOKE_CHANNEL: nightly
          VOICEWISE_UPDATER_DOWNLOAD_OPEN_SMOKE_OPEN_MODE: probe
        run: npm run test:macos-installed-launch
