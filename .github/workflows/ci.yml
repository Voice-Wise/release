name: CI (Cross-Repo)

on:
  repository_dispatch:
    types: [ci]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to test"
        required: true
        type: string
      ref:
        description: "Git ref (branch name)"
        required: false
        default: "master"
        type: string

concurrency:
  group: ci-${{ github.event.client_payload.sha || github.event.inputs.sha }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare CI
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.params.outputs.sha }}
      ref: ${{ steps.params.outputs.ref }}
      sender_repo: ${{ steps.params.outputs.sender_repo }}
    steps:
      - name: Get parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.event.client_payload.ref }}" >> $GITHUB_OUTPUT
            echo "sender_repo=${{ github.event.client_payload.sender_repo }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.event.inputs.sha }}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.event.inputs.ref }}" >> $GITHUB_OUTPUT
            echo "sender_repo=Voice-Wise/VoiceWise" >> $GITHUB_OUTPUT
          fi

      - name: Set commit status (pending)
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ steps.params.outputs.sender_repo }}/statuses/${{ steps.params.outputs.sha }}" \
            -d '{
              "state": "pending",
              "target_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description": "CI is running...",
              "context": "ci/cross-repo"
            }'

  ci:
    name: Run CI (${{ matrix.name }})
    needs: [prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            run_frontend: true
            run_build: true

          - name: Windows
            os: windows-latest
            run_frontend: false
            run_build: false

    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/VoiceWise
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Enable git long paths (Windows)
        if: ${{ runner.os == 'Windows' }}
        run: git config --system core.longpaths true

      - name: "Optimize I/O for Windows (use D: drive)"
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $cargoHome = "D:/a/_cargo"
          $cargoTargetDir = "D:/a/_cargo-target"
          $bunCache = "D:/a/_bun-cache"
          New-Item -ItemType Directory -Force -Path $cargoHome | Out-Null
          New-Item -ItemType Directory -Force -Path $cargoTargetDir | Out-Null
          New-Item -ItemType Directory -Force -Path $bunCache | Out-Null
          echo "CARGO_HOME=$cargoHome" >> $env:GITHUB_ENV
          echo "CARGO_TARGET_DIR=$cargoTargetDir" >> $env:GITHUB_ENV
          echo "BUN_INSTALL_CACHE_DIR=$bunCache" >> $env:GITHUB_ENV

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            D:/a/_bun-cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          env-vars: |
            CARGO_HOME
            CARGO_TARGET_DIR

      - name: Run Rust tests
        run: bun run test:rust

      - name: Run functional tests
        run: bun run test:functional

      - name: Run frontend unit tests
        if: ${{ matrix.run_frontend }}
        run: bun run test:fe

      - name: Build frontend
        if: ${{ matrix.run_build }}
        run: bun run build

  finalize:
    name: Report CI Status
    if: ${{ always() }}
    needs: [prepare, ci]
    runs-on: ubuntu-latest
    steps:
      - name: Set commit status (success)
        if: ${{ needs.ci.result == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.prepare.outputs.sender_repo }}/statuses/${{ needs.prepare.outputs.sha }}" \
            -d '{
              "state": "success",
              "target_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description": "CI passed",
              "context": "ci/cross-repo"
            }'

      - name: Set commit status (failure)
        if: ${{ needs.ci.result != 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ needs.prepare.outputs.sender_repo }}/statuses/${{ needs.prepare.outputs.sha }}" \
            -d '{
              "state": "failure",
              "target_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description": "CI failed",
              "context": "ci/cross-repo"
            }'
