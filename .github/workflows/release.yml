name: Release Build

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag or branch)"
        required: true
        type: string
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      skip_windows:
        description: "Skip Windows jobs and packaging"
        required: false
        default: true
        type: boolean

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.changelog.outputs.notes }}
      version: ${{ steps.params.outputs.version }}
      ref: ${{ steps.params.outputs.ref }}
      skip_windows: ${{ steps.params.outputs.skip_windows }}
      package_matrix: ${{ steps.package-matrix.outputs.matrix }}
    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Get build parameters
        id: params
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.ref }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            skip_windows='${{ github.event.client_payload.skip_windows }}'
          else
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            skip_windows='${{ inputs.skip_windows }}'
          fi

          skip_windows="$(printf '%s' "${skip_windows:-true}" | tr '[:upper:]' '[:lower:]')"
          case "${skip_windows}" in
            true|1|yes) echo "skip_windows=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "skip_windows=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build package matrix
        id: package-matrix
        env:
          SKIP_WINDOWS: ${{ steps.params.outputs.skip_windows }}
        run: |
          echo "matrix=$(node electron-release/package-matrix.mjs --skip-windows "$SKIP_WINDOWS")" >> "$GITHUB_OUTPUT"

      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ steps.params.outputs.ref }}
          path: source
          fetch-depth: 0
          fetch-tags: true

      - name: Verify stable tag + version consistency
        working-directory: source
        env:
          BUILD_REF: ${{ steps.params.outputs.ref }}
          BUILD_VERSION: ${{ steps.params.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${BUILD_REF}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Expected stable tag vX.Y.Z, got: ${BUILD_REF}" >&2
            exit 1
          fi
          EXPECTED="${BUILD_REF#v}"
          if [[ "${BUILD_VERSION}" != "${EXPECTED}" ]]; then
            echo "Version input mismatch: ref=${BUILD_REF}, version=${BUILD_VERSION}" >&2
            exit 1
          fi
          PACKAGE_VERSION="$(node -e "process.stdout.write(require('./package.json').version)")"
          if [[ "${PACKAGE_VERSION}" != "${EXPECTED}" ]]; then
            echo "package.json version mismatch: tag=${EXPECTED}, package.json=${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Generate changelog from commits
        id: changelog
        working-directory: source
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          CURRENT_TAG: ${{ steps.params.outputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 --match 'v*' "${CURRENT_TAG}^" 2>/dev/null || true)"

          if [[ -n "${PREV_TAG}" ]]; then
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="https://github.com/Voice-Wise/voicewise-electron/compare/${PREV_TAG}...${CURRENT_TAG}"
          else
            RANGE="HEAD"
            COMPARE_URL=""
          fi

          COMMITS="$(git log --reverse --no-merges --format='%s' "${RANGE}" | grep -v '^chore(release):' || true)"
          if [[ -z "$COMMITS" ]]; then
            NOTES="## Changelog\n\n- No changes.\n"
          else
            PROMPT="Based on the following git commit messages, generate a concise and user-friendly changelog in BOTH Chinese (Simplified) and English. First output the Chinese version, then add a horizontal rule (---), then output the English version. Group changes by category. Only include meaningful changes, skip trivial commits. Output ONLY markdown changelog content.\n\nCompare: ${COMPARE_URL}\n\nCommit messages:\n$COMMITS"
            RESPONSE=$(curl -s --max-time 30 "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions" \
              -H "Authorization: Bearer $DASHSCOPE_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg prompt "$PROMPT" '{model:"qwen3.6-plus",messages:[{role:"user",content:$prompt}],max_tokens:1024}')" 2>/dev/null || echo "{}")
            CHANGELOG=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
            if [[ -z "$CHANGELOG" ]]; then
              NOTES="## Changelog\n\nSee source repository for details.\n"
            else
              NOTES="## Changelog\n\n${CHANGELOG}\n"
            fi
          fi

          {
            echo "notes<<EOF"
            echo -e "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  test:
    name: Test (${{ matrix.name }})
    needs: [prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest
          - name: macOS (x64)
            os: macos-latest
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/audio-capture -> target

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Run local functional tests
        run: npm run test:functional:local

  test-windows:
    name: Test (Windows)
    needs: [prepare]
    if: ${{ needs.prepare.outputs.skip_windows != 'true' }}
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Enable git long paths
        run: git config --system core.longpaths true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Run local functional tests
        run: npm run test:functional:local

  cloud-regression:
    name: Cloud Regression
    needs: [prepare]
    runs-on: macos-latest
    env:
      VOICEWISE_TEST_AUTH_JSON: ${{ secrets.VOICEWISE_TEST_AUTH_JSON }}
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cloud functional tests
        run: npm run test:functional:cloud

      - name: Run Omni Plus cloud retry tests
        run: npm run test:functional:cloud:omni-plus-retry

  create-release:
    name: Create Stable Release
    needs: [prepare, test, cloud-regression]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      version: ${{ needs.prepare.outputs.version }}
      ref: ${{ needs.prepare.outputs.ref }}
      skip_windows: ${{ needs.prepare.outputs.skip_windows }}
    steps:
      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: LiveType v${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.release_body }}
          generate_release_notes: false
          draft: false
          prerelease: false

  package:
    name: Package (${{ matrix.name }})
    needs: [prepare, create-release]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.platform == 'windows' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.package_matrix) }}
    env:
      SENTRY_RELEASE: voicewise@${{ needs.create-release.outputs.version }}
      SENTRY_DIST: stable-${{ github.run_number }}-${{ github.run_attempt }}
      VITE_SENTRY_RELEASE: voicewise@${{ needs.create-release.outputs.version }}
      VITE_SENTRY_DIST: stable-${{ github.run_number }}-${{ github.run_attempt }}
    steps:
      - name: Checkout private source code
        uses: actions/checkout@v4
        with:
          repository: Voice-Wise/voicewise-electron
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ needs.create-release.outputs.ref }}

      - name: Enable git long paths
        if: ${{ runner.os == 'Windows' }}
        run: git config --system core.longpaths true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        if: ${{ runner.os == 'Windows' }}
        run: choco install nsis -y --no-progress

      - name: Import Apple code signing cert
        if: ${{ runner.os == 'macOS' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          KEYCHAIN_PATH="$RUNNER_TEMP/livetype-build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/apple_cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          CSC_NAME="${APPLE_SIGNING_IDENTITY#Developer ID Application: }"
          echo "CSC_NAME=${CSC_NAME}" >> "$GITHUB_ENV"

      - name: Build Electron package
        run: npm run build && npx electron-builder ${{ matrix.builderArgs }}

      - name: Collect release assets
        shell: bash
        env:
          ARTIFACT_PATTERNS: ${{ toJson(matrix.artifactPaths) }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          node electron-release/collect-release-assets.mjs \
            --patterns-json "$ARTIFACT_PATTERNS" \
            --out-dir release-assets

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v${{ needs.create-release.outputs.version }} release-assets/* --clobber --repo "$GITHUB_REPOSITORY"

      - name: Collect Sentry debug symbols
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT_DIR="$RUNNER_TEMP/sentry-debug/${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$OUTPUT_DIR"
          find dist \( -type d -name '*.dSYM' -o -type f -name '*.pdb' \) -exec cp -R {} "$OUTPUT_DIR/" \; || true
          touch "$OUTPUT_DIR/.keep"

      - name: Upload Sentry debug symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentry-debug-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/sentry-debug/${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: warn

      - name: Upload Sentry sourcemap artifact
        if: ${{ matrix.platform == 'macos' && matrix.arch == 'arm64' }}
        uses: actions/upload-artifact@v4
        with:
          name: sentry-dist
          path: dist
          if-no-files-found: error

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: release-assets
          if-no-files-found: error

  sentry-release:
    name: Upload Sentry Assets
    needs: [create-release, package]
    if: ${{ always() && needs.create-release.result == 'success' && needs.package.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Download Sentry sourcemap artifact
        uses: actions/download-artifact@v4
        with:
          name: sentry-dist
          path: ${{ runner.temp }}/sentry/dist

      - name: Download Sentry debug artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sentry-debug-*
          path: ${{ runner.temp }}/sentry/debug
          merge-multiple: true

      - name: Upload source map and debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: voicewise@${{ needs.create-release.outputs.version }}
          SENTRY_DIST: stable-${{ github.run_number }}-${{ github.run_attempt }}
          SENTRY_SOURCEMAP_DIR: ${{ runner.temp }}/sentry/dist
          SENTRY_DEBUG_ROOT: ${{ runner.temp }}/sentry/debug
        run: bash scripts/upload-sentry-release-assets.sh

  publish-manifest:
    name: Publish Stable Manifest
    needs: [create-release, package, sentry-release]
    if: ${{ always() && needs.create-release.result == 'success' && needs.package.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Generate Electron updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.create-release.outputs.version }}"
          ASSETS_JSON="$(gh release view "$TAG" --json assets --jq '.assets')"
          PUBLISHED_AT="$(gh release view "$TAG" --json publishedAt --jq '.publishedAt')"
          MANIFEST_PLATFORMS="darwin-aarch64,darwin-x86_64"
          if [ "${{ needs.create-release.outputs.skip_windows }}" != "true" ]; then
            MANIFEST_PLATFORMS="${MANIFEST_PLATFORMS},windows-x86_64"
          fi
          node electron-release/generate-updater-manifest.mjs \
            --assets-json "$ASSETS_JSON" \
            --version "${{ needs.create-release.outputs.version }}" \
            --published-at "$PUBLISHED_AT" \
            --base-url "https://github.com/Voice-Wise/release/releases/download/${TAG}" \
            --platforms "$MANIFEST_PLATFORMS" \
            --out-dir "."

      - name: Upload manifest to stable release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v${{ needs.create-release.outputs.version }} latest.json --clobber
